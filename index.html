<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Бібліотека ресурсів</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Sora:wght@300;400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1120;
  --surface:rgba(255,255,255,0.06);
  --surface-h:rgba(255,255,255,0.10);
  --border:rgba(255,255,255,0.10);
  --border-h:rgba(255,255,255,0.20);
  --text:#eeeef8;
  --text-2:#9090b8;
  --text-3:#50507a;
  --r:20px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── AURORA ── */
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(110px);opacity:.3;animation:drift 28s ease-in-out infinite}
.orb1{width:700px;height:700px;background:radial-gradient(circle,#7c3aed,transparent);top:-250px;left:-200px;animation-duration:30s}
.orb2{width:550px;height:550px;background:radial-gradient(circle,#0891b2,transparent);top:35%;right:-200px;animation-delay:-9s;animation-duration:24s}
.orb3{width:650px;height:650px;background:radial-gradient(circle,#db2777,transparent);bottom:-150px;left:25%;animation-delay:-17s;animation-duration:34s}
.orb4{width:450px;height:450px;background:radial-gradient(circle,#2563eb,transparent);top:55%;left:-120px;animation-delay:-5s;animation-duration:22s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(50px,35px) scale(1.04)}50%{transform:translate(-35px,70px) scale(.96)}75%{transform:translate(70px,-35px) scale(1.07)}}

/* ── LAYOUT ── */
.wrap{position:relative;z-index:1;max-width:1380px;margin:0 auto;padding:0 24px}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:100;background:rgba(14,17,32,.78);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);border-bottom:1px solid var(--border)}
.hinner{max-width:1380px;margin:0 auto;padding:16px 24px;display:flex;align-items:center}
.logo{font-family:'Sora',sans-serif;font-size:17px;font-weight:700;white-space:nowrap;letter-spacing:-.3px}

.snav-wrap{padding:0 0 4px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;margin-bottom:2px}
.snav-wrap::-webkit-scrollbar{display:none}
.sp{flex-shrink:0;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:40px;padding:7px 18px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text-2);cursor:pointer;transition:all .2s;white-space:nowrap}
.sp:hover{background:rgba(255,255,255,.1);color:var(--text)}
.sp.on{color:#fff;font-weight:500}

/* ── HERO ── */
.hero{padding:60px 0 36px;text-align:center}
.htitle{font-family:'Playfair Display',Georgia,serif;font-size:clamp(44px,8vw,90px);font-weight:900;line-height:1.15;letter-spacing:-1px;padding:0 0 8px;background:linear-gradient(135deg,#fff 0%,#c4b5fd 38%,#7dd3fc 68%,#fff 100%);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 7s ease-in-out infinite;margin-bottom:18px}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.hsub{font-size:17px;color:var(--text-2);font-weight:300;margin-bottom:28px;max-width:440px;margin-left:auto;margin-right:auto;line-height:1.6}
.hstats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.stat{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:40px;padding:5px 15px;font-size:12.5px;color:var(--text-2)}

/* ── SECTION NAV (content area) ── */

/* ── QUICK FILTERS ── */
.qfs{display:flex;gap:8px;flex-wrap:wrap;padding:8px 0 24px}
.qf{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:40px;padding:7px 18px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text-2);cursor:pointer;transition:all .2s;white-space:nowrap}
.qf:hover{background:rgba(255,255,255,.1);color:var(--text)}
.qf.on{background:linear-gradient(135deg,rgba(124,58,237,.28),rgba(6,182,212,.28));border-color:rgba(124,58,237,.45);color:#fff;font-weight:500}

/* ── RESULTS INFO ── */
.rinfo{text-align:center;font-size:12.5px;color:var(--text-3);margin-bottom:20px;min-height:18px}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:15px;padding-bottom:80px}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--ac);border-radius:var(--r);padding:22px;display:flex;flex-direction:column;gap:11px;transition:transform .3s cubic-bezier(.23,1,.32,1),box-shadow .3s,background .2s,border-color .2s;position:relative;overflow:hidden;animation:cin .45s ease both;will-change:transform}
.card:hover{background:var(--surface-h);border-color:var(--border-h);border-left-color:var(--ac);transform:translateY(-5px);box-shadow:0 20px 55px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.06)}
@keyframes cin{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

.ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.cicon{font-size:20px;line-height:1;flex-shrink:0}
.cbadges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.b{font-size:10.5px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap}
.bfmt{background:rgba(255,255,255,.07);color:var(--text-2);border:1px solid var(--border)}
.bfree{background:rgba(16,185,129,.18);color:#86efac;border:1px solid rgba(16,185,129,.28)}
.bpart{background:rgba(234,179,8,.18);color:#fde68a;border:1px solid rgba(234,179,8,.28)}
.bpaid{background:rgba(239,68,68,.14);color:#fca5a5;border:1px solid rgba(239,68,68,.28)}

.ctitle{font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:var(--text);line-height:1.3}
.cdesc{font-size:12.5px;color:var(--text-2);line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.ctags{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px}
.tag{font-size:10.5px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text-3);cursor:pointer;transition:all .15s}
.tag:hover{background:rgba(255,255,255,.09);color:var(--text-2)}
.cfoot{margin-top:auto;padding-top:6px}
.cbtn{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:40px;padding:7px 16px;font-size:12.5px;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--text);text-decoration:none;cursor:pointer;transition:all .2s}
.cbtn:hover{background:var(--ac);border-color:var(--ac);color:#fff}

/* ── EMPTY ── */
.empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text-3)}
.empty-ico{font-size:44px;margin-bottom:14px}
.empty h3{font-family:'Sora',sans-serif;font-size:19px;color:var(--text-2);margin-bottom:7px}

/* ── MODAL ── */
.mover{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:none;align-items:center;justify-content:center;padding:24px;opacity:0;transition:opacity .2s}
.mover.on{display:flex;opacity:1}
.mbox{background:rgba(12,12,24,.97);border:1px solid rgba(255,255,255,.11);border-radius:26px;max-width:620px;width:100%;max-height:84vh;overflow-y:auto;padding:36px 38px;position:relative;animation:min .28s cubic-bezier(.23,1,.32,1);scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
@keyframes min{from{opacity:0;transform:scale(.9) translateY(22px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mclose{position:absolute;top:18px;right:18px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--text-2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mclose:hover{background:rgba(255,255,255,.14);color:var(--text)}
.mc h1{font-family:'Sora',sans-serif;font-size:22px;font-weight:700;margin-bottom:22px;color:var(--text)}
.mc h2{font-family:'Sora',sans-serif;font-size:14px;font-weight:600;color:var(--text-2);margin:20px 0 10px;text-transform:uppercase;letter-spacing:.5px}
.mc p{font-size:13.5px;color:var(--text-2);line-height:1.7;margin-bottom:10px}
.mc ul{list-style:none;padding:0;display:flex;flex-direction:column;gap:7px;margin-bottom:6px}
.mc ul li{font-size:13px;color:var(--text-2);line-height:1.6;padding-left:20px;position:relative}
.mc ul li::before{content:'→';position:absolute;left:0;color:var(--text-3)}
.mc .ci::before{content:'✓';color:#10b981}
.mc .ri::before{content:'✕';color:#ef4444}
.mc .gi::before{content:'✓';color:#10b981}
.mc .note{font-size:13px;padding:10px 14px;border-radius:10px;margin:14px 0}
.mc .note.purple{background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.22);color:#c4b5fd}
.mc .note.green{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#86efac}
.mc .code{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:11px;padding:14px 16px;font-family:'DM Mono',monospace;font-size:12.5px;color:#a78bfa;margin:12px 0;white-space:pre-wrap;line-height:1.7}
.mc table{width:100%;border-collapse:collapse;margin:14px 0;font-size:12.5px}
.mc th{text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text-3);font-weight:500}
.mc td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text-2)}
.mc td:first-child{color:var(--text)}

/* ── FOOTER ── */
footer{position:relative;z-index:1;text-align:center;padding:28px 24px;border-top:1px solid var(--border);color:var(--text-3);font-size:12.5px}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .hinner{padding:11px 16px}
  .snav-wrap{padding:0 0 10px}
  .wrap{padding:0 16px}
  .hero{padding:40px 0 22px}
  .grid{grid-template-columns:1fr}
  .mbox{padding:26px 18px;border-radius:20px}
}
</style>
</head>
<body>

<div class="aurora">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
</div>

<header>
  <div class="hinner">
    <div class="logo">📚 Ресурси</div>
  </div>
</header>

<main class="wrap">
  <section class="hero">
    <h1 class="htitle">Бібліотека<br>ресурсів</h1>
    <p class="hsub">Перевірені матеріали для розвитку, кар'єри та добробуту — зібрані в одному місці</p>
    <div class="hstats">
      <span class="stat">51 ресурс</span>
      <span class="stat">8 розділів</span>
      <span class="stat">5 гайдів</span>
    </div>
  </section>

  <div class="snav-wrap" id="snav"></div>

  <div class="qfs" id="qfs">
    <button class="qf on" data-q="all">⭐ Всі</button>
    <button class="qf" data-q="free">💸 Безкоштовно</button>
    <button class="qf" data-q="beg">🆕 Для початківців</button>
    <button class="qf" data-q="ua">🇺🇦 Для українців</button>
    <button class="qf" data-q="cert">🏆 Сертифікат</button>
  </div>

  <div class="rinfo" id="rinfo"></div>
  <div class="grid" id="grid"></div>
</main>

<footer>Зібрано з ❤️ · Всі ресурси перевірено · 2025–2026</footer>

<div class="mover" id="mover">
  <div class="mbox">
    <button class="mclose" id="mclose">✕</button>
    <div class="mc" id="mc"></div>
  </div>
</div>

<script>
const SEC={
  english:      {label:'🌍 Англійська',   color:'#06b6d4'},
  jobs:         {label:'💼 Пошук роботи', color:'#3b82f6'},

  ai:           {label:'🤖 AI',           color:'#ec4899'},
  courses:      {label:'🎓 Курси',        color:'#f97316'},
  mental:       {label:'🧠 Ментальне',    color:'#10b981'},
  finance:      {label:'💰 Фінанси',      color:'#eab308'},
  opps:         {label:'🚀 Можливості',   color:'#ef4444'},
};

const GUIDES={
  linkedin:{title:'✅ Чеклист LinkedIn',html:`
    <h1>✅ Чеклист LinkedIn-профілю</h1>
    <h2>Візуальна частина</h2><ul>
    <li class=ci>Актуальне фото — обличчя у фокусі, без відволікаючого фону</li>
    <li class=ci>Бекграунд відображає твою професійну ідентичність</li>
    <li class=ci>Кастомне посилання (linkedin.com/in/твоє-ім'я)</li></ul>
    <h2>Headline / Заголовок</h2>
    <div class="note purple">Формула: <strong>Посада</strong> + для кого + цінність<br>
    <em style="opacity:.75">Приклад: Junior UX Designer | Роблю інтерфейси зрозумілими для людей, не тільки для екранів</em></div>
    <h2>Секція About</h2><ul>
    <li class=ci>Починається з цікавого твердження або питання</li>
    <li class=ci>Показує глибину досвіду — роки, навички, стек</li>
    <li class=ci>Є "надздібність" — чим вирізняєшся</li>
    <li class=ci>Є заклик до дії (контакт для зв'язку)</li></ul>
    <h2>Досвід роботи</h2><ul>
    <li class=ci>Описаний з ключовими словами під твій напрямок</li>
    <li class=ci>Є вимірювані результати (числа, відсотки, масштаб)</li>
    <li class=ci>Career Break якщо є хронологічна прогалина</li>
    <li class=ci>Медіа — презентації, відео, проєкти</li></ul>
    <h2>Активність</h2><ul>
    <li class=ci>"Open to work" статус увімкнений</li>
    <li class=ci>Job Alerts налаштовані</li>
    <li class=ci>Запити на рекомендації надіслані</li>
    <li class=ci>Featured секція: резюме / портфоліо</li></ul>`},
  iq:{title:'✅ Питання на співбесіді',html:`
    <h1>✅ Питання які ставити на співбесіді</h1>

    <h2>Про розвиток</h2><ul>
    <li>Які перспективи росту передбачає ця позиція?</li>

    <h2>Про команду та роль</h2><ul>
    <li>З ким я буду найчастіше взаємодіяти?</li>
    <li>Які очікування від мене на цій позиції?</li>
    <li>Які виклики передбачені — в рамках функції?</li></ul>
    <h2>Про культуру</h2><ul>
    <li>Чому ви особисто обрали цю компанію?</li>
    <li>Як ви виросли тут за цей час?</li>
    <li>Якими досягненнями пишається компанія?</li>
    <li>Як компанія реагує в кризових ситуаціях?</li></ul>
    <div class="note green">💡 Підготуй 3–4 питання заздалегідь. Відсутність питань = низька мотивація.</div>`},
  rf:{title:'🚩 Red flags на співбесіді',html:`
    <h1>🚩 Що НЕ робити на співбесіді</h1>
    <h2>Червоні прапорці для рекрутера</h2><ul>
    <li class=ri>Критика попередніх колег, керівників або навчальних закладів</li>
    <li class=ri>Відповіді "Не знаю" без спроби поміркувати вголос</li>
    <li class=ri>Соціально прийнятні відповіді без аргументів ("Я дуже відповідальний")</li>
    <li class=ri>Запізнення — навіть на онлайн-зустріч</li>
    <li class=ri>Низький рівень підготовки про компанію = низька мотивація</li>

    <li class=gi>Знання продуктів або останніх новин компанії</li></ul>`},
  prompts:{title:'🧠 Як писати промпти',html:`
    <h1>🧠 Як писати промпти що працюють</h1>

    <li><strong style="color:#f0f0f8">Обмеження</strong> — чого не треба<br><em style="color:#55557a;font-size:12px">«Без кліше, не більше 200 слів»</em></li>
    <li><strong style="color:#f0f0f8">Формат</strong> — як оформити результат<br><em style="color:#55557a;font-size:12px">«Три абзаци з CTA в кінці»</em></li></ul>
    <h2>Шаблон</h2>

    <li class=ri>Занадто довгий промпт без структури</li>
    <li class=ri>Очікування що AI "здогадається" що ти мав на увазі</li></ul>`},
  aimap:{title:'🗺 Карта AI-інструментів',html:`
    <h1>🗺 Карта AI-інструментів</h1>
    <p>4 категорії — що коли обирати.</p>
    <h2>💬 Chat-інтерфейси</h2>
    <p style="color:var(--text-3);font-size:12.5px;margin-bottom:8px">Для текстів, аналізу, відповідей на питання</p><ul>

    <li>Claude — claude.ai</li>

let curSec='all', curQF='all', curQ='';

function init(){
  buildNav();
  buildCards();
  // Quick filters
  document.getElementById('qfs').querySelectorAll('.qf').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.qf').forEach(x=>x.classList.remove('on'));
      b.classList.add('on'); curQF=b.dataset.q; buildCards();
    });
  });
  // Search
  // Modal
  document.getElementById('mclose').addEventListener('click',closeM);
  document.getElementById('mover').addEventListener('click',e=>{if(e.target===e.currentTarget)closeM();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});
}

function buildNav(){
  const nav=document.getElementById('snav');
  let h=`<button class="sp on" data-s="all" style="">✨ Всі</button>`;
  for(const[k,v] of Object.entries(SEC)){
    h+=`<button class="sp" data-s="${k}" style="color:${v.color}88">${v.label}</button>`;
  }
  nav.innerHTML=h;
  nav.querySelectorAll('.sp').forEach(b=>{
    b.addEventListener('click',()=>{
      nav.querySelectorAll('.sp').forEach(x=>{x.classList.remove('on');x.style.background='';x.style.borderColor='';x.style.color=SEC[x.dataset.s]?.color+'88'||'';});
      b.classList.add('on');
      if(b.dataset.s!=='all'){const c=SEC[b.dataset.s].color;b.style.background=c+'22';b.style.borderColor=c+'55';b.style.color=c;}
      else{b.style.background='rgba(255,255,255,0.15)';b.style.borderColor='rgba(255,255,255,0.3)';b.style.color='#fff';}
      curSec=b.dataset.s; buildCards();
    });
  });
  // init "all" active style
  nav.querySelector('[data-s="all"]').style.cssText='background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3);color:#fff';
}

function filter(){
  return RES.filter(r=>{
    if(curSec!=='all'&&r.s!==curSec)return false;
    if(curQF==='free'&&r.p!=='безкоштовно')return false;
    if(curQF==='beg'&&!r.t.includes('для початківців'))return false;
    if(curQF==='ua'&&!r.t.includes('українською'))return false;
    if(curQF==='cert'&&!r.t.includes('сертифікат'))return false;
    if(curQ){const q=curQ.toLowerCase();if(!r.n.toLowerCase().includes(q)&&!r.d.toLowerCase().includes(q)&&!r.t.some(x=>x.includes(q)))return false;}
    return true;
  });
}

function buildCards(){
  const grid=document.getElementById('grid');
  const info=document.getElementById('rinfo');
  const list=filter();
  info.textContent=list.length?`Знайдено ${list.length} ресурс${list.length===1?'':'ів'}`:'';
  if(!list.length){grid.innerHTML=`<div class="empty"><div class="empty-ico">🔍</div><h3>Нічого не знайдено</h3><p style="color:var(--text-3);font-size:13px;margin-top:6px">Спробуй змінити фільтри або пошуковий запит</p></div>`;return;}
  grid.innerHTML=list.map((r,i)=>{
    const sec=SEC[r.s];
    const pc=r.p==='безкоштовно'?'bfree':r.p==='частково'?'bpart':'bpaid';
    const btn=r.g
      ?`<button class="cbtn" onclick="openG('${r.g}')">Відкрити гайд ↗</button>`
      :`<a class="cbtn" href="${r.url}" target="_blank" rel="noopener">Перейти →</a>`;
    return `<div class="card" style="--ac:${sec.color};animation-delay:${i*.035}s">
      <div class="ctop">
        <div class="cicon">${sec.label.split(' ')[0]}</div>
        <div class="cbadges"><span class="b bfmt">${r.f}</span><span class="b ${pc}">${r.p}</span></div>
      </div>
      <div class="ctitle">${r.n}</div>
      <div class="cdesc">${r.d}</div>
      <div class="ctags">${r.t.map(x=>`<span class="tag" onclick="tagFilter('${x}')">${x}</span>`).join('')}</div>
      <div class="cfoot">${btn}</div>
    </div>`;
  }).join('');
}

function openG(k){
  const g=GUIDES[k]; if(!g)return;
  document.getElementById('mc').innerHTML=g.html;
  const m=document.getElementById('mover');
  m.style.display='flex'; setTimeout(()=>m.style.opacity=1,10);
  document.body.style.overflow='hidden';
}
function closeM(){
  const m=document.getElementById('mover');
  m.style.opacity=0; setTimeout(()=>{m.style.display='none';},200);
  document.body.style.overflow='';
}
function tagFilter(tag){
  curQ=tag; buildCards();
  window.scrollTo({top:0,behavior:'smooth'});
}

init();
</script>
</body>
</html>
